# GlazeWM Configuration (ooodnakov-config)
# https://github.com/glazewm/glazewm

general:
  # Gaps between windows and the screen edge.
  gaps:
    inner_gap: 8
    outer_gap: 12
    scale_with_dpi: true

  # Focus behavior
  focus_follows_cursor: true
  cursor_jump:
    enabled: true
    trigger: "monitor_focus"

  # Window hiding (cloak is best for Win11)
  hide_method: "cloak"

  # Border settings
  active_window_border:
    enabled: true
    width: 8
    color: "#8eb2c7" # Ashes Blue

  # Animation settings
  animations:
    enabled: true

# Use Zebar as the bar
bar:
  enabled: false

# Startup / Shutdown
startup_commands:
  - "zebar start-widget --pack ooodnakov --widget-name ooodnakov --anchor top_center --offset-x 0 --offset-y 0 --width 100% --height 40px --monitor-type all"

shutdown_commands:
  - "taskkill /F /IM zebar.exe"

# Workspace icons (matching komorebi)
workspaces:
  - name: "1"
    display_name: "󰈹"
  - name: "2"
    display_name: ""
  - name: "3"
    display_name: "󰙯"
  - name: "4"
    display_name: "󰓓"
  - name: "5"
    display_name: "󱓷"
  - name: "6"
    display_name: "󰉋"
  - name: "7"
    display_name: "󰊫"

# Keybindings
keybindings:
  # Focus windows
  - command: "focus --direction left"
    binding: "Alt+H"
  - command: "focus --direction down"
    binding: "Alt+J"
  - command: "focus --direction up"
    binding: "Alt+K"
  - command: "focus --direction right"
    binding: "Alt+L"

  # Move windows
  - command: "move --direction left"
    binding: "Alt+Shift+H"
  - command: "move --direction down"
    binding: "Alt+Shift+J"
  - command: "move --direction up"
    binding: "Alt+Shift+K"
  - command: "move --direction right"
    binding: "Alt+Shift+L"

  # Multi-Monitor
  - command: "focus-monitor --direction left"
    binding: "Alt+W"
  - command: "focus-monitor --direction right"
    binding: "Alt+E"
  - command: "move-to-monitor --direction left"
    binding: "Alt+Shift+W"
  - command: "move-to-monitor --direction right"
    binding: "Alt+Shift+E"

  # Workspaces
  - command: "focus --workspace 1"
    binding: "Alt+1"
  - command: "focus --workspace 2"
    binding: "Alt+2"
  - command: "focus --workspace 3"
    binding: "Alt+3"
  - command: "focus --workspace 4"
    binding: "Alt+4"
  - command: "focus --workspace 5"
    binding: "Alt+5"
  - command: "focus --workspace 6"
    binding: "Alt+6"
  - command: "focus --workspace 7"
    binding: "Alt+7"

  # Move to workspace
  - command: "move --workspace 1"
    binding: "Alt+Shift+1"
  - command: "move --workspace 2"
    binding: "Alt+Shift+2"
  - command: "move --workspace 3"
    binding: "Alt+Shift+3"
  - command: "move --workspace 4"
    binding: "Alt+Shift+4"
  - command: "move --workspace 5"
    binding: "Alt+Shift+5"
  - command: "move --workspace 6"
    binding: "Alt+Shift+6"
  - command: "move --workspace 7"
    binding: "Alt+Shift+7"

  # Binding Modes
  - command: "wm-enable-binding-mode resize"
    binding: "Alt+R"

  # Layout Toggles
  - command: "toggle-floating"
    binding: "Alt+T"
  - command: "toggle-fullscreen"
    binding: "Alt+Shift+F"
  - command: "toggle-tiling-direction"
    binding: "Alt+X"

  # System
  - command: "close"
    binding: "Alt+Q"
  - command: "reload-config"
    binding: "Alt+Shift+O"
  - command: "exit-wm"
    binding: "Alt+Shift+Q"

# Resize Binding Mode
binding_modes:
  - name: "resize"
    keybindings:
      - command: "resize --width -2%"
        binding: "H"
      - command: "resize --height 2%"
        binding: "J"
      - command: "resize --height -2%"
        binding: "K"
      - command: "resize --width 2%"
        binding: "L"
      - command: "wm-disable-binding-mode resize"
        bindings: ["Escape", "Enter"]

# Rules for floating windows
window_rules:
  - match:
      - process_name: "/(Calculator|TaskManager|ControlPanel|SystemSettings|SearchHost)/"
    commands: ["set-floating"]
  - match:
      - class_name: "/(SunAwtDialog|ApplicationFrameWindow)/"
    commands: ["set-floating"]
  
  # Workspace Routing
  - match:
      - process_name: "/(chrome|firefox|zen)/"
    commands: ["move --workspace 1"]
  - match:
      - process_name: "/(wezterm|alacritty|windowsterminal)/"
    commands: ["move --workspace 2"]
