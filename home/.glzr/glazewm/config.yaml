# GlazeWM Configuration (ooodnakov-config)
# https://github.com/glazewm/glazewm

general:
  # Gaps between windows and the screen edge.
  gaps:
    inner_gap: 8
    outer_gap: 12

  # Focus behavior
  focus_follows_mouse: true
  mouse_follows_focus: true

  # Border settings (thicker, high contrast)
  active_window_border:
    enabled: true
    width: 20
    color: "#8eb2c7" # Ashes Blue

  # Animation settings
  animations:
    enabled: true

# Bar configuration (Floating Island Look)
bar:
  enabled: true
  height: "44px"
  position: "top"
  opacity: 0.85
  background: "#1c2023"
  foreground: "#c0c5ce"
  font_family: "MesloLGSDZ Nerd Font Mono"
  font_size: "14px"
  padding: "0px 15px"
  offset_x: "12px"
  offset_y: "12px"
  width: "calc(100% - 24px)"
  components_left:
    - type: "workspaces"
      focused_color: "#8eb2c7"
      empty_color: "#565e65"
      occupied_color: "#c0c5ce"
  components_right:
    - type: "cpu"
      label: " "
      refresh_interval_ms: 2000
    - type: "memory"
      label: " "
      refresh_interval_ms: 2000
    - type: "time"
      format: "󱑒 %H:%M"
    - type: "date"
      format: "󰃭 %a, %b %d"

# Workspace icons (matching komorebi)
workspaces:
  - name: "1"
    display_name: "󰈹"
  - name: "2"
    display_name: ""
  - name: "3"
    display_name: "󰙯"
  - name: "4"
    display_name: "󰓓"
  - name: "5"
    display_name: "󱓷"
  - name: "6"
    display_name: "󰉋"
  - name: "7"
    display_name: "󰊫"

# Keybindings matching komorebi behavior
keybindings:
  # Focus windows
  - command: "focus left"
    binding: "Alt+H"
  - command: "focus down"
    binding: "Alt+J"
  - command: "focus up"
    binding: "Alt+K"
  - command: "focus right"
    binding: "Alt+L"

  # Move windows
  - command: "move left"
    binding: "Alt+Shift+H"
  - command: "move down"
    binding: "Alt+Shift+J"
  - command: "move up"
    binding: "Alt+Shift+K"
  - command: "move right"
    binding: "Alt+Shift+L"

  # Multi-Monitor (matched to Alt+W/E)
  - command: "focus monitor left"
    binding: "Alt+W"
  - command: "focus monitor right"
    binding: "Alt+E"
  - command: "move to monitor left"
    binding: "Alt+Shift+W"
  - command: "move to monitor right"
    binding: "Alt+Shift+E"

  # Workspaces
  - command: "switch workspace 1"
    binding: "Alt+1"
  - command: "switch workspace 2"
    binding: "Alt+2"
  - command: "switch workspace 3"
    binding: "Alt+3"
  - command: "switch workspace 4"
    binding: "Alt+4"
  - command: "switch workspace 5"
    binding: "Alt+5"
  - command: "switch workspace 6"
    binding: "Alt+6"
  - command: "switch workspace 7"
    binding: "Alt+7"

  # Move to workspace
  - command: "move to workspace 1"
    binding: "Alt+Shift+1"
  - command: "move to workspace 2"
    binding: "Alt+Shift+2"
  - command: "move to workspace 3"
    binding: "Alt+Shift+3"
  - command: "move to workspace 4"
    binding: "Alt+Shift+4"
  - command: "move to workspace 5"
    binding: "Alt+Shift+5"
  - command: "move to workspace 6"
    binding: "Alt+Shift+6"
  - command: "move to workspace 7"
    binding: "Alt+Shift+7"

  # Layout Toggles (matched to komorebi)
  - command: "toggle floating"
    binding: "Alt+T"
  - command: "toggle fullscreen"
    binding: "Alt+Shift+F"
  - command: "set tiling direction toggle"
    binding: "Alt+X"

  # System
  - command: "close"
    binding: "Alt+Q"
  - command: "reload config"
    binding: "Alt+Shift+O"
  - command: "exit wm"
    binding: "Alt+Shift+Q"

# Rules for floating windows
window_rules:
  - command: "set floating"
    match_process_name: "/(Calculator|TaskManager|ControlPanel|SystemSettings|SearchHost)/"
  - command: "set floating"
    match_class_name: "/(SunAwtDialog|ApplicationFrameWindow)/"
  
  # Workspace Routing
  - command: "move to workspace 1"
    match_process_name: "/(chrome|firefox|zen)/"
  - command: "move to workspace 2"
    match_process_name: "/(wezterm|alacritty|windowsterminal)/"
