<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ooodnakov Zebar</title>
  <style>
    :root {
      --bg: rgba(28, 32, 35, 0.85);
      --fg: #c0c5ce;
      --accent: #8eb2c7;
      --font: "MesloLGSDZ Nerd Font Mono", sans-serif;
      --critical: #f2777a;
      --warning: #f99157;
      --success: #99cc99;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--font);
      color: var(--fg);
      overflow: hidden;
    }

    #bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 32px; /* Slightly slimmer for professional feel */
      margin: 10px;
      padding: 0 15px;
      background: var(--bg);
      backdrop-filter: blur(12px);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Workspaces */
    .workspace {
      font-size: 14px;
      padding: 1px 6px;
      border-radius: 4px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0.5;
    }

    .workspace.focused {
      opacity: 1;
      background: var(--accent);
      color: #1c2023;
      transform: scale(1.1);
    }

    .workspace.occupied {
      opacity: 0.9;
      color: var(--fg);
    }

    /* Window Title */
    #window-title {
      font-size: 13px;
      max-width: 400px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--fg);
      opacity: 0.8;
    }

    /* Widgets */
    .widget {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
    }

    .icon {
      color: var(--accent);
      font-size: 14px;
    }

    .critical { color: var(--critical); }
    .warning { color: var(--warning); }
  </style>
</head>
<body>
  <div id="bar">
    <div class="group" id="left">
      <div class="group" id="workspaces"></div>
      <div id="window-title">Ready</div>
    </div>

    <div class="group" id="center">
      <div class="widget">
        <span class="icon">󱑒</span>
        <span id="time">00:00</span>
      </div>
    </div>

    <div class="group" id="right">
      <div class="widget" id="net-widget">
        <span class="icon" id="net-icon">󰤨</span>
        <span id="net-text">--</span>
      </div>
      <div class="widget">
        <span class="icon"></span>
        <span id="cpu">0%</span>
      </div>
      <div class="widget">
        <span class="icon"></span>
        <span id="memory">0%</span>
      </div>
      <div class="widget" id="bat-widget">
        <span class="icon" id="bat-icon">󰁹</span>
        <span id="bat-text">--%</span>
      </div>
      <div class="widget">
        <span class="icon">󰃭</span>
        <span id="date">Mon, Jan 01</span>
      </div>
    </div>
  </div>

  <script>
    const zebar = window.zebar;
    
    zebar.on('update', (data) => {
      // Update Time & Date
      if (data.date) {
        const d = new Date(data.date.now);
        document.getElementById('time').innerText = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        document.getElementById('date').innerText = d.toLocaleDateString([], { weekday: 'short', month: 'short', day: '2-digit' });
      }

      // Update CPU & Memory
      if (data.cpu) {
        document.getElementById('cpu').innerText = Math.round(data.cpu.usage) + '%';
      }
      if (data.memory) {
        document.getElementById('memory').innerText = Math.round(data.memory.usage_percent) + '%';
      }

      // Update Battery
      if (data.battery) {
        const bat = data.battery;
        const text = document.getElementById('bat-text');
        const icon = document.getElementById('bat-icon');
        text.innerText = Math.round(bat.charge_percent) + '%';
        
        if (bat.is_charging) icon.innerText = '󰂄';
        else if (bat.charge_percent < 20) {
          icon.innerText = '󰂃';
          text.classList.add('critical');
        } else icon.innerText = '󰁹';
      }

      // Update Network
      if (data.network) {
        const net = data.network;
        const icon = document.getElementById('net-icon');
        const text = document.getElementById('net-text');
        if (net.default_interface) {
          text.innerText = net.default_interface.type === 'wifi' ? 'Wifi' : 'Eth';
          icon.innerText = net.default_interface.type === 'wifi' ? '󰤨' : '󰈀';
        } else {
          text.innerText = 'Offline';
          icon.innerText = '󰤭';
        }
      }

      // Update Workspaces & Window Title from GlazeWM
      if (data.glazewm) {
        const wsContainer = document.getElementById('workspaces');
        const titleEl = document.getElementById('window-title');
        wsContainer.innerHTML = '';
        
        const icons = { "1": "󰈹", "2": "", "3": "󰙯", "4": "󰓓", "5": "󱓷", "6": "󰉋", "7": "󰊫" };

        data.glazewm.workspaces.forEach(ws => {
          const el = document.createElement('div');
          el.className = 'workspace' + (ws.is_focused ? ' focused' : '') + (ws.children.length > 0 ? ' occupied' : '');
          el.innerText = icons[ws.name] || ws.name;
          wsContainer.appendChild(el);
        });

        if (data.glazewm.focused_window) {
          titleEl.innerText = data.glazewm.focused_window.title;
        } else {
          titleEl.innerText = 'Desktop';
        }
      }
    });
  </script>
</body>
</html>
