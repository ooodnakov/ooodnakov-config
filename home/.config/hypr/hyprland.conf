# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃      CachyOS Hyprland Configuration — adapted for odnakov    ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# Based on:
# https://github.com/CachyOS/cachyos-hyprland-settings/tree/master/etc/skel/.config/hypr

$mainMod = SUPER

# Load order is intentional:
# palette/default commands -> session state -> device policy -> compositor UI
# -> startup side effects -> interactive binds -> local last-word overrides.
source = ~/.config/hypr/config/00-colors.conf
source = ~/.config/hypr/config/01-defaults.conf
source = ~/.config/hypr/config/10-environment.conf
source = ~/.config/hypr/config/20-monitors.conf
source = ~/.config/hypr/config/30-input.conf
source = ~/.config/hypr/config/40-layout.conf
source = ~/.config/hypr/config/50-decoration.conf
source = ~/.config/hypr/config/60-animations.conf
source = ~/.config/hypr/config/70-windowrules.conf
source = ~/.config/hypr/config/80-autostart.conf
source = ~/.config/hypr/config/90-keybinds.conf
source = ~/.config/hypr/config/99-user-overrides.conf
