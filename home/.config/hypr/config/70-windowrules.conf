# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Window Rules Configuration               ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛


# Float necessary dialogs.
windowrule = float true, match:class = ^(org.pulseaudio.pavucontrol)$
windowrule = float true, match:class = ^()$, match:title = ^(Picture in picture)$
windowrule = float true, match:class = ^()$, match:title = ^(Save File)$
windowrule = float true, match:class = ^()$, match:title = ^(Open File)$
windowrule = float true, match:title = ^(Picture-in-Picture)$
windowrule = size 960 540, match:title = ^(Picture-in-Picture)$
windowrule = center true, match:title = ^(Picture-in-Picture)$
windowrule = float true, match:class = ^(blueman-manager)$
windowrule = float true, match:class = ^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland)(.*)$
windowrule = float true, match:class = ^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org.kde.polkit-kde-authentication-agent-1)(.*)$
windowrule = float true, match:class = ^(CachyOSHello)$
windowrule = float true, match:class = ^(zenity)$
windowrule = float true, match:class = ^()$, match:title = ^(Steam - Self Updater)$

# User app polish.
windowrule = opacity 0.92, match:class = ^(org.kde.dolphin|dolphin)$
windowrule = opacity 0.96, match:class = ^(discord|vesktop|armcord|webcord)$
windowrule = opacity 0.95, match:title = ^(QQ|Telegram)$
windowrule = animation slide right, match:class = ^(org.wezfurlong.wezterm|kitty|Alacritty)$
windowrule = no_blur true, match:class = ^(zen|zen-browser|org.mozilla.firefox)$

# Floating window decorations.
windowrule = border_size 2, match:float = true, match:workspace = w[fv1-10]
windowrule = border_color $noctalia_tertiary, match:float = true, match:workspace = w[fv1-10]
windowrule = rounding 8, match:float = true, match:workspace = w[fv1-10]

# Tiling window decorations.
windowrule = border_size 3, match:float = false, match:workspace = f[1-10]
windowrule = rounding 4, match:float = false, match:workspace = f[1-10]

# Let apps request maximize without breaking tiling state.
windowrule = suppress_event maximize, match:class = .*

# Workspace labels matching Niri muscle memory.
workspace = name:browser, default:true
workspace = name:coding
workspace = name:chat
workspace = name:gaming
workspace = name:media
workspace = special:scratchpad
workspace = special:exposed, gapsout:60, gapsin:30, bordersize:5, border:true, shadow:false

# Smart gaps.
workspace = w[tv1-10], gapsout:10, gapsin:5
workspace = f[1], gapsout:10, gapsin:5

# Noctalia/Quickshell layers.
layerrule = blur = true, blur_popups = true, match:namespace = .*(noctalia|quickshell).*
