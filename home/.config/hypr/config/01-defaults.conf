# ┃                     Defaults Configuration                  ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# CachyOS defaults adapted to tools already used in Niri.

$terminal = wezterm
$filemanager = dolphin
$browser = zen-browser

# Launchers and shell UI.
$applauncher = vicinae toggle
$noctalia_launcher = qs -c noctalia-shell ipc call launcher toggle
$controlcenter = qs -c noctalia-shell ipc call controlCenter toggle
$settings = qs -c noctalia-shell ipc call settings toggle
$lockscreen = hyprlock --config /home/odnakov/.config/hypr/hyprlock.conf --grace 0 --immediate-render --no-fade-in
$sessionmenu = qs -c noctalia-shell ipc call sessionMenu toggle
$pypr = pypr-client

# Screenshots copy PNG to clipboard.
$shot_region = grim -g "$(slurp)" - | wl-copy -t image/png
$shot_window = grim -g "$(hyprctl activewindow -j | jq -r '"'"'"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"'"'"')" - | wl-copy -t image/png
$shot_screen = grim - | wl-copy -t image/png

# Idle lock skips fullscreen games and playing media; before-sleep still locks.
$idlehandler = swayidle -w timeout 300 '/home/odnakov/.config/hypr/scripts/hypr-idle-lock.sh' before-sleep '/home/odnakov/.config/hypr/scripts/hypr-idle-lock.sh --force'
