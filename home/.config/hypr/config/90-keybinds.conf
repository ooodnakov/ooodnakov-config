# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                         Keybinds                            ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛


# Applications and Noctalia/Vicinae shell controls.
bindd = $mainMod, RETURN, Open terminal ($terminal), exec, $terminal
bindd = SHIFT, F1, Open terminal ($terminal), exec, $terminal
bindd = $mainMod, E, Open file manager ($filemanager), exec, $filemanager
bindd = $mainMod, B, Open browser ($browser), exec, $browser
bindd = $mainMod, SPACE, Open Vicinae launcher, exec, $applauncher
bindd = $mainMod CTRL, RETURN, Open Noctalia launcher, exec, $noctalia_launcher
bindd = $mainMod, S, Toggle Noctalia control center, exec, $controlcenter
bindd = $mainMod, COMMA, Toggle Noctalia settings, exec, $settings
bindd = $mainMod ALT, L, Lock screen with Noctalia, exec, $lockscreen
bindd = $mainMod SHIFT, Q, Toggle Noctalia session menu, exec, $sessionmenu
bindd = ALT, V, Open Vicinae clipboard history, exec, vicinae vicinae://launch/clipboard/history
bindd = $mainMod, apostrophe, Toggle Pyprland WezTerm scratchpad, exec, $pypr toggle term
bindd = $mainMod, O, Show Pyprland window overview, exec, $pypr expose

# Window/session actions.
bindd = $mainMod, Q, Close active window, killactive,
bindd = $mainMod SHIFT, M, Exit Hyprland by terminating user session, exec, loginctl terminate-user ""
bindd = $mainMod, V, Toggle floating, togglefloating,
bindd = $mainMod, T, Toggle floating, togglefloating,
bindd = $mainMod, F, Toggle fullscreen, fullscreen
bindd = $mainMod, Y, Pin active floating window, pin
bindd = $mainMod, P, Toggle pseudotile, pseudo,

# Screenshots.
bindd = , Print, Copy region screenshot, exec, $shot_region
bindd = CTRL, Print, Copy active-window screenshot, exec, $shot_window
bindd = ALT, Print, Copy full screenshot, exec, $shot_screen
bindd = $mainMod SHIFT, S, Copy region screenshot, exec, $shot_region

# Media controls through Noctalia Shell.
bindel = , XF86AudioRaiseVolume, exec, qs -c noctalia-shell ipc call volume increase
bindel = , XF86AudioLowerVolume, exec, qs -c noctalia-shell ipc call volume decrease
bindel = , XF86AudioMute, exec, qs -c noctalia-shell ipc call volume muteOutput
bindel = , XF86AudioMicMute, exec, qs -c noctalia-shell ipc call volume muteInput
bindl = , XF86AudioPlay, exec, qs -c noctalia-shell ipc call media playPause
bindl = , XF86AudioPause, exec, qs -c noctalia-shell ipc call media playPause
bindl = , XF86AudioNext, exec, qs -c noctalia-shell ipc call media next
bindl = , XF86AudioPrev, exec, qs -c noctalia-shell ipc call media previous
bindel = , XF86MonBrightnessUp, exec, qs -c noctalia-shell ipc call brightness increase
bindel = , XF86MonBrightnessDown, exec, qs -c noctalia-shell ipc call brightness decrease

# Grouping windows.
bindd = $mainMod, W, Toggle active window group, togglegroup,
bindd = $mainMod, Tab, Switch to last workspace, workspace, previous

# Toggle gaps.
bindd = $mainMod SHIFT, G, Restore CachyOS gaps, exec, hyprctl --batch "keyword general:gaps_out 5; keyword general:gaps_in 3"
bindd = $mainMod, G, Remove gaps, exec, hyprctl --batch "keyword general:gaps_out 0; keyword general:gaps_in 0"

# Move focus with arrows and vim keys.
bindd = $mainMod, left, Focus left, movefocus, l
bindd = $mainMod, right, Focus right, movefocus, r
bindd = $mainMod, up, Focus up, movefocus, u
bindd = $mainMod, down, Focus down, movefocus, d
bindd = $mainMod, H, Focus left, movefocus, l
bindd = $mainMod, L, Focus right, movefocus, r
bindd = $mainMod, K, Focus up, movefocus, u
bindd = $mainMod, J, Focus down, movefocus, d

# Move active window with Niri-like Mod+Ctrl bindings.
bindd = $mainMod CTRL, left, Move window left, movewindow, l
bindd = $mainMod CTRL, right, Move window right, movewindow, r
bindd = $mainMod CTRL, up, Move window up, movewindow, u
bindd = $mainMod CTRL, down, Move window down, movewindow, d
bindd = $mainMod CTRL, H, Move window left, movewindow, l
bindd = $mainMod CTRL, L, Move window right, movewindow, r
bindd = $mainMod CTRL, K, Move window up, movewindow, u
bindd = $mainMod CTRL, J, Move window down, movewindow, d

# Move/resize with mouse.
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Keyboard resize mode.
bindd = $mainMod, R, Enter resize mode, submap, resize
submap = resize
bindd = , right, Resize right, resizeactive, 15 0
bindd = , left, Resize left, resizeactive, -15 0
bindd = , up, Resize up, resizeactive, 0 -15
bindd = , down, Resize down, resizeactive, 0 15
bindd = , l, Resize right, resizeactive, 15 0
bindd = , h, Resize left, resizeactive, -15 0
bindd = , k, Resize up, resizeactive, 0 -15
bindd = , j, Resize down, resizeactive, 0 15
bindd = , escape, Exit resize mode, submap, reset
submap = reset

# Quick resize without submap.
bindd = $mainMod CTRL SHIFT, right, Resize right, resizeactive, 15 0
bindd = $mainMod CTRL SHIFT, left, Resize left, resizeactive, -15 0
bindd = $mainMod CTRL SHIFT, up, Resize up, resizeactive, 0 -15
bindd = $mainMod CTRL SHIFT, down, Resize down, resizeactive, 0 15
bindd = $mainMod CTRL SHIFT, l, Resize right, resizeactive, 15 0
bindd = $mainMod CTRL SHIFT, h, Resize left, resizeactive, -15 0
bindd = $mainMod CTRL SHIFT, k, Resize up, resizeactive, 0 -15
bindd = $mainMod CTRL SHIFT, j, Resize down, resizeactive, 0 15

# Workspaces: first five preserve Niri names.
bindd = $mainMod, 1, Switch to browser workspace, workspace, name:browser
bindd = $mainMod, 2, Switch to coding workspace, workspace, name:coding
bindd = $mainMod, 3, Switch to chat workspace, workspace, name:chat
bindd = $mainMod, 4, Switch to gaming workspace, workspace, name:gaming
bindd = $mainMod, 5, Switch to media workspace, workspace, name:media
bindd = $mainMod, 6, Switch to workspace 6, workspace, 6
bindd = $mainMod, 7, Switch to workspace 7, workspace, 7
bindd = $mainMod, 8, Switch to workspace 8, workspace, 8
bindd = $mainMod, 9, Switch to workspace 9, workspace, 9
bindd = $mainMod, 0, Switch to workspace 10, workspace, 10
bindd = $mainMod, slash, Switch to previous workspace, workspace, previous
bindd = $mainMod, PERIOD, Next workspace, workspace, e+1
bindd = $mainMod, mouse_down, Next workspace, workspace, e+1
bindd = $mainMod, mouse_up, Previous workspace, workspace, e-1

# Move active window to workspace; Ctrl mirrors current Niri config.
bindd = $mainMod CTRL, 1, Move window to browser workspace, movetoworkspace, name:browser
bindd = $mainMod CTRL, 2, Move window to coding workspace, movetoworkspace, name:coding
bindd = $mainMod CTRL, 3, Move window to chat workspace, movetoworkspace, name:chat
bindd = $mainMod CTRL, 4, Move window to gaming workspace, movetoworkspace, name:gaming
bindd = $mainMod CTRL, 5, Move window to media workspace, movetoworkspace, name:media
bindd = $mainMod CTRL, 6, Move window to workspace 6, movetoworkspace, 6
bindd = $mainMod CTRL, 7, Move window to workspace 7, movetoworkspace, 7
bindd = $mainMod CTRL, 8, Move window to workspace 8, movetoworkspace, 8
bindd = $mainMod CTRL, 9, Move window to workspace 9, movetoworkspace, 9
bindd = $mainMod CTRL, 0, Move window to workspace 10, movetoworkspace, 10
bindd = $mainMod CTRL, mouse_down, Move window to next workspace, movetoworkspace, e+1
bindd = $mainMod CTRL, mouse_up, Move window to previous workspace, movetoworkspace, e-1

# Move active window silently with Shift, matching CachyOS default behavior.
bindd = $mainMod SHIFT, 1, Move window silently to browser workspace, movetoworkspacesilent, name:browser
bindd = $mainMod SHIFT, 2, Move window silently to coding workspace, movetoworkspacesilent, name:coding
bindd = $mainMod SHIFT, 3, Move window silently to chat workspace, movetoworkspacesilent, name:chat
bindd = $mainMod SHIFT, 4, Move window silently to gaming workspace, movetoworkspacesilent, name:gaming
bindd = $mainMod SHIFT, 5, Move window silently to media workspace, movetoworkspacesilent, name:media
bindd = $mainMod SHIFT, 6, Move window silently to workspace 6, movetoworkspacesilent, 6
bindd = $mainMod SHIFT, 7, Move window silently to workspace 7, movetoworkspacesilent, 7
bindd = $mainMod SHIFT, 8, Move window silently to workspace 8, movetoworkspacesilent, 8
bindd = $mainMod SHIFT, 9, Move window silently to workspace 9, movetoworkspacesilent, 9
bindd = $mainMod SHIFT, 0, Move window silently to workspace 10, movetoworkspacesilent, 10

# Generic special workspace.
bindd = $mainMod, minus, Move active window to special workspace, movetoworkspace, special
bindd = $mainMod, equal, Toggle special workspace, togglespecialworkspace, special

binds {
    allow_workspace_cycles = 1
    workspace_back_and_forth = 1
    workspace_center_on = 1
    movefocus_cycles_fullscreen = true
    window_direction_monitor_fallback = true
}
