# ┃                      Input Configuration                    ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
# Mirrors Niri keyboard/touchpad behavior.

input {
    kb_file = ~/.config/hypr/keyboard/ul_combo.xkb
    numlock_by_default = true

    follow_mouse = 2
    float_switch_override_focus = 2

    touchpad {
        tap-to-click = true
        natural_scroll = true
    }
}

# NVIDIA/dual-GPU workaround: avoid ghost/stuck hardware cursor planes.
cursor {
    no_hardware_cursors = true
    use_cpu_buffer = true
}
