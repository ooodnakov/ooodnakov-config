# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Autostart Configuration                  ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛


# Export session env for systemd/dbus activated apps.
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP HYPRLAND_INSTANCE_SIGNATURE

# Load enabled hyprpm plugins, including Hyprspace.
exec-once = hyprpm reload

# Tools already used in Niri.
exec-once = qs -c noctalia-shell
exec-once = vicinae server
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = /usr/bin/pypr

# Clipboard history for Vicinae/noctalia integrations.
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Idle lock.
exec-once = $idlehandler
