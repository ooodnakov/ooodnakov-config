$font = Fira Sans

# Reliable lock screen. Noctalia lock was falling through to Hyprland's black
# lockdead screen on this session.
general {
    hide_cursor = false
    immediate_render = true
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = smooth, 0.05, 0.9, 0.1, 1.05
    animation = fadeIn, 1, 3, smooth
    animation = fadeOut, 1, 3, smooth
    animation = inputFieldDots, 1, 2, smooth
}

background {
    monitor =
    path = screenshot
    color = rgba(282828ff)
    blur_passes = 2
    blur_size = 6
    vibrancy = 0.1696
}

input-field {
    monitor =
    size = 420, 56
    outline_thickness = 2
    inner_color = rgba(282828cc)
    outer_color = rgba(b8bb26ff)
    check_color = rgba(fabd2fff)
    fail_color = rgba(fb4934ff)
    font_color = rgba(ebdbb2ff)
    fail_text = $PAMFAIL
    placeholder_text = Password...
    fade_on_empty = false
    rounding = 18
    font_family = $font
    dots_spacing = 0.25

    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(ebdbb2ff)
    font_size = 76
    font_family = $font
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(000000aa)

    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = Locked as $USER
    color = rgba(b8bb26ff)
    font_size = 22
    font_family = $font

    position = 0, 42
    halign = center
    valign = center
}
