# Managed by oooconf.
# Add portable Yazi defaults here as they are adopted.
[manager]
exclude = [
  "**/node_modules",
  "**/.git",
  "**/.DS_Store",
  "**/target",
  "**/__pycache__",
]

[[plugin.prepend_fetchers]]
id = "git"    # Remove if Yazi > v26.1.22
url = "*"
run = "git"
group = "git"

[[plugin.prepend_fetchers]]
id = "git"    # Remove if Yazi > v26.1.22
url = "*/"
run = "git"
group = "git"


[plugin]
prepend_previewers = [
  { url = "*.md", run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark -- "$1"' },
  { url = "*.tar*", run = 'piper -- tar tf "$1"' },
  { url = "*.txt.gz", run = 'piper -- gzip -dc "$1"' },
  { url = "*.csv", run = 'piper -- bat -p --color=always -- "$1"' },
  { url = "*/", run = 'piper -- eza -a -TL=3 --git --color=always --icons=always --group-directories-first --ignore-glob="*.tmp" -I="node_modules|__pycache__|.git|.ruff_cache|.pytest_cache" --no-quotes "$1"' },
]
append_previewers = [{ url = "*", run = 'piper -- echo "$1"' }]
