name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  shell-validation:
    name: Shell validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install shellcheck (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Shell syntax checks
        run: |
          bash -n scripts/setup.sh
          bash -n scripts/ooodnakov.sh
          bash -n scripts/delete.sh
          bash -n scripts/update-pins.sh
          bash -n bootstrap.sh

      - name: Shellcheck
        run: |
          shellcheck scripts/setup.sh scripts/ooodnakov.sh scripts/delete.sh scripts/update-pins.sh bootstrap.sh

      - name: Validate lock artifacts are reproducible
        run: |
          python3 scripts/generate_dependency_lock.py
          git diff --exit-code deps.lock.json docs/dependency-lock.md

      - name: Managed Neovim/WezTerm config smoke checks
        run: |
          python3 -m json.tool home/.config/nvim/lazy-lock.json > /dev/null
          python3 -m json.tool home/.config/nvim/lazyvim.json > /dev/null

          test -f home/.config/nvim/init.lua
          test -f home/.config/nvim/lua/config/lazy.lua
          test -f home/.config/wezterm/wezterm.lua
          test -f home/.config/wezterm/config/init.lua

      - name: Oooconf smoke tests (install --dry-run, doctor, lock)
        run: |
          bash scripts/ooodnakov.sh install --dry-run --yes-optional

          TEMP_HOME="$(mktemp -d)"
          set +e
          HOME="$TEMP_HOME" XDG_CONFIG_HOME="$TEMP_HOME/.config" bash scripts/ooodnakov.sh doctor
          doctor_status=$?
          set -e
          test "$doctor_status" -ne 0

          bash scripts/ooodnakov.sh lock
          git diff --exit-code deps.lock.json docs/dependency-lock.md

  powershell-validation:
    name: PowerShell validation (windows-latest)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $scripts = @(
            "scripts/setup.ps1",
            "scripts/ooodnakov.ps1"
          )
          foreach ($script in $scripts) {
            $null = $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $script),
              [ref]$null,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_.Message }
              throw "PowerShell parse failed: $script"
            }
            Write-Host "[ok] Parsed $script"
          }

      - name: Managed Neovim/WezTerm config smoke checks
        shell: pwsh
        run: |
          Get-Content "home/.config/nvim/lazy-lock.json" -Raw | ConvertFrom-Json | Out-Null
          Get-Content "home/.config/nvim/lazyvim.json" -Raw | ConvertFrom-Json | Out-Null

          $requiredFiles = @(
            "home/.config/nvim/init.lua",
            "home/.config/nvim/lua/config/lazy.lua",
            "home/.config/wezterm/wezterm.lua",
            "home/.config/wezterm/config/init.lua"
          )

          foreach ($path in $requiredFiles) {
            if (-not (Test-Path $path -PathType Leaf)) {
              throw "Missing required managed config file: $path"
            }
            Write-Host "[ok] Found $path"
          }

      - name: Oooconf smoke tests (install --dry-run, doctor, lock)
        shell: pwsh
        run: |
          ./scripts/ooodnakov.ps1 install --dry-run --yes-optional

          $tempHome = Join-Path $env:RUNNER_TEMP "oooconf-smoke-home"
          New-Item -ItemType Directory -Path $tempHome -Force | Out-Null

          $previousHome = $env:HOME
          $previousXdgConfigHome = $env:XDG_CONFIG_HOME
          try {
            $env:HOME = $tempHome
            $env:XDG_CONFIG_HOME = Join-Path $tempHome ".config"

            $doctorFailed = $false
            try {
              ./scripts/ooodnakov.ps1 doctor
            } catch {
              $doctorFailed = $true
              Write-Host "[ok] doctor failed on fresh HOME as expected"
            }

            if (-not $doctorFailed) {
              throw "Expected doctor to fail on fresh HOME, but it succeeded."
            }
          } finally {
            $env:HOME = $previousHome
            if ($null -eq $previousXdgConfigHome) {
              Remove-Item Env:XDG_CONFIG_HOME -ErrorAction SilentlyContinue
            } else {
              $env:XDG_CONFIG_HOME = $previousXdgConfigHome
            }
          }

          ./scripts/ooodnakov.ps1 lock
          git diff --exit-code deps.lock.json docs/dependency-lock.md
