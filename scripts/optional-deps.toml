# Optional dependency catalog.
# This file is the single source of truth for optional deps.
# Both Unix and PowerShell setup scripts read from it.
#
# Fields:
#   key          - unique identifier used in `oooconf deps <key>`
#   display      - human-readable name shown in picker/list
#   description  - short explanation of purpose
#
# Platform install (one or more):
#   linux.manager   - apt, brew, curl, cargo, custom
#   macos.manager   - brew, curl, cargo, custom
#   windows.manager - choco, winget, curl, cargo, custom
#   package         - package name for apt/brew/choco/winget
#   command         - shell command for curl/custom managers
#   winget_id       - winget package ID (when different from package)
#   choco_id        - choco package ID (when different from package)
#
# To add a new optional dep, append a [[deps]] block.
# To remove one, delete its block and run `oooconf lock`.

[[deps]]
key = "wget"
display = "wget"
description = "downloading auxiliary assets and parity with ezsh tooling"
linux.manager = "apt"
linux.package = "wget"
macos.manager = "brew"
macos.package = "wget"
windows.manager = "choco"
windows.choco_id = "wget"
windows.package = "wget"

[[deps]]
key = "git"
display = "git"
description = "Git version control"
linux.manager = "apt"
linux.package = "git"
macos.manager = "brew"
macos.package = "git"
windows.manager = "winget"
windows.winget_id = "Git.Git"
windows.package = "git"

[[deps]]
key = "wezterm"
display = "wezterm"
description = "WezTerm terminal"
linux.manager = "apt"
linux.command = "curl -fsSL https://apt.fury.io/wez/gpg.key | sudo gpg --yes --dearmor -o /usr/share/keyrings/wezterm-fury.gpg && echo 'deb [signed-by=/usr/share/keyrings/wezterm-fury.gpg] https://apt.fury.io/wez/ * *' | sudo tee /etc/apt/sources.list.d/wezterm.list && sudo apt update && sudo apt install wezterm"
macos.manager = "brew"
macos.package = "wezterm"
windows.manager = "winget"
windows.winget_id = "wez.wezterm"
windows.package = "wezterm"

