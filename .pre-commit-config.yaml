repos:
  - repo: local
    hooks:
      - id: shell-syntax
        name: Shell syntax checks (bash -n)
        entry: bash -n
        language: system
        types: [shell]
        files: ^(scripts/(setup|ooodnakov|delete|update-pins|minimal-setup)\.sh|bootstrap\.sh)$

      - id: shellcheck
        name: Shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        files: ^(scripts/(setup|ooodnakov|delete|update-pins|minimal-setup)\.sh|bootstrap\.sh)$

      - id: ruff-check
        name: Ruff lint
        entry: uv run ruff check
        language: system
        pass_filenames: false

      - id: ruff-format-check
        name: Ruff format check
        entry: uv run ruff format --check
        language: system
        pass_filenames: false

      - id: lockfile-reproducibility
        name: Lockfile reproducibility
        entry: bash -c 'uv run python scripts/generate_dependency_lock.py && git diff --exit-code deps.lock.json docs/dependency-lock.md'
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: ^third_party/
      - id: end-of-file-fixer
        exclude: ^third_party/
      - id: check-yaml
        exclude: ^third_party/
